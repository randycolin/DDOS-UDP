name: Build Binary and Run Python

on:
  push:
    branches: [ "fuck" ]
  workflow_dispatch:

jobs:
  build-run:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2️⃣ Install GCC
    - name: Install GCC
      run: |
        sudo apt update
        sudo apt install -y build-essential gcc

    # 3️⃣ Make Binary FIRST
    - name: Compile Binary
      run: |
        gcc GoFuck.c.c -O2 -Wall -o udp
        chmod +x udp

    # 4️⃣ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 5️⃣ Install Python Libraries
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyTelegramBotAPI

    # 6️⃣ Run Python Script AFTER binary build
    - name: Run Python Bot
      run: |
        python py.py
